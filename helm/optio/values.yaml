# Optio Helm Chart Values

# API Server
api:
  image:
    repository: optio-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 4000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env:
    LOG_LEVEL: info
  # Pod anti-affinity spreads API replicas across nodes.
  # "soft" = preferredDuringSchedulingIgnoredDuringExecution (default)
  # "hard" = requiredDuringSchedulingIgnoredDuringExecution
  # ""     = disabled
  antiAffinity: soft
  # Worker scaling: BullMQ workers (task-worker, pr-watcher, repo-cleanup,
  # ticket-sync) use Redis-backed queues with built-in leader election via
  # BullMQ's concurrency model. Each worker type processes jobs independently,
  # so multiple API replicas safely share the same queue — Redis ensures each
  # job is delivered to exactly one worker instance. You can safely increase
  # api.replicas for high availability without risking duplicate job processing.

# Web UI
web:
  image:
    repository: optio-web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Pod anti-affinity (same options as api.antiAffinity)
  antiAffinity: soft

# Agent containers
agent:
  image:
    repository: ghcr.io/jonwiggins/optio-agent-node
    tag: latest
    pullPolicy: IfNotPresent  # Use "Never" for local images
  imagePullPolicy: IfNotPresent  # Use "Never" for local images
  # PVC template for repo pod home directories.
  # These PVCs are created dynamically by the API server (one per repo pod
  # instance), but this template controls the storage class and default size.
  pvc:
    storageClass: ""  # Empty = cluster default storage class
    size: 10Gi
    accessModes:
      - ReadWriteOnce

# PostgreSQL
postgresql:
  # Set to false to use an external database
  enabled: true
  image:
    repository: postgres
    tag: "16"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
  auth:
    database: optio
    username: optio
    # IMPORTANT: Override this in production! The chart will fail to install
    # if this is left as the default value and auth is enabled.
    password: ""

# Redis
redis:
  # Set to false to use an external Redis
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# External database (used when postgresql.enabled=false)
externalDatabase:
  url: ""  # e.g., postgres://user:pass@host:5432/optio

# External Redis (used when redis.enabled=false)
externalRedis:
  url: ""  # e.g., redis://host:6379

# Authentication
auth:
  # Set to true to disable authentication (NOT recommended for production).
  # When false, at least one OAuth provider must be configured.
  disabled: false
  # OAuth provider credentials
  github:
    clientId: ""
    clientSecret: ""
  google:
    clientId: ""
    clientSecret: ""
  gitlab:
    clientId: ""
    clientSecret: ""
    # baseUrl: https://gitlab.com  # Self-hosted GitLab URL

# GitHub webhook signature validation
webhook:
  githubSecret: ""  # Generate with: openssl rand -hex 32. Must match GitHub's webhook config.

# Secrets encryption
encryption:
  key: ""  # Generate with: openssl rand -hex 32. Required.

# Ingress
ingress:
  enabled: false
  className: nginx
  annotations: {}
  # cert-manager TLS support. When enabled, the chart adds the
  # cert-manager.io/cluster-issuer annotation and generates a TLS block
  # for each host automatically.
  certManager:
    enabled: false
    clusterIssuer: letsencrypt-prod
  hosts:
    - host: optio.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web
        - path: /api
          pathType: Prefix
          service: api
        - path: /ws
          pathType: Prefix
          service: api
  # Manual TLS configuration. When certManager is enabled, TLS entries are
  # generated automatically from hosts — this field is only needed for
  # manual certificate management.
  tls: []
  #  - secretName: optio-tls
  #    hosts:
  #      - optio.example.com

# Namespace
namespace: optio

# Namespace resource quotas. Enable to prevent rogue agents from consuming
# all cluster resources. Set to false or leave limits empty to disable.
resourceQuota:
  enabled: false
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "50"
    persistentvolumeclaims: "30"

# Service account
serviceAccount:
  create: true
  name: optio
  annotations: {}

# Image pull secrets for pulling from private registries.
# Each entry should be the name of an existing Kubernetes secret of type
# kubernetes.io/dockerconfigjson in the target namespace.
imagePullSecrets: []
#  - name: my-registry-secret
